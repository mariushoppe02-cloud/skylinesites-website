<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 90" width="540" height="90">
  <defs>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9963B"/>
      <stop offset="100%" stop-color="#E8B84B"/>
    </linearGradient>
  </defs>

  <!-- ── Goldene Türme aus Original-SVG (nur Gebäude, kein Text) ── -->
  <svg x="0" y="4" width="128" height="82" viewBox="272 278 213 134" overflow="visible">
    <defs>
      <linearGradient id="goldTower" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#9A7028"/>
        <stop offset="50%" stop-color="#C9963B"/>
        <stop offset="100%" stop-color="#E8B84B"/>
      </linearGradient>
    </defs>
    <!-- Linkes Gebäude (kurz) -->
    <path stroke-linecap="butt" transform="matrix(0,-0.75,0.75,0,276.10874,409.977072)" fill="none" d="M 0 4 L 60.76 4" stroke="#C9963B" stroke-width="8"/>
    <!-- Diagonale links oben -->
    <path stroke-linecap="butt" transform="matrix(0.703129,-0.260977,0.260977,0.703129,276.14199,364.353137)" fill="none" d="M 0 4 L 33.86 4" stroke="#E8B84B" stroke-width="8"/>
    <!-- 2. Gebäude links -->
    <path stroke-linecap="butt" transform="matrix(0,-0.75,0.75,0,294.988903,409.97844)" fill="none" d="M 0 4 L 68.87 4" stroke="#C9963B" stroke-width="8"/>
    <!-- Diagonale 2 -->
    <path stroke-linecap="butt" transform="matrix(-0.725773,-0.189086,0.189086,-0.725773,321.917125,367.313088)" fill="none" d="M 0 4 L 32.15 4" stroke="#E8B84B" stroke-width="8"/>
    <!-- 3. Gebäude -->
    <path stroke-linecap="butt" transform="matrix(0,-0.75,0.75,0,318.030455,409.979736)" fill="none" d="M 0 4 L 96.82 4" stroke="#C9963B" stroke-width="8"/>
    <!-- Dach-Diagonale 3 -->
    <path stroke-linecap="butt" transform="matrix(0.702181,-0.263519,0.263519,0.702181,318.38237,337.31684)" fill="none" d="M 0 4 L 67.95 4" stroke="#E8B84B" stroke-width="8"/>
    <!-- Arrowhead path 7 -->
    <path fill="#E8B84B" transform="translate(358,318)" d="M 0.74 4.38 L 10.76 0.27 L 10.59 8.89 Z"/>
    <!-- 4. Gebäude (mittelhoch) -->
    <path stroke-linecap="butt" transform="matrix(0,-0.75,0.75,0,362.499359,409.976424)" fill="none" d="M 0 4 L 118.62 4" stroke="#C9963B" stroke-width="8"/>
    <!-- 5. Gebäude (höchstes) -->
    <path stroke-linecap="butt" transform="matrix(0,-0.75,0.75,0,384.250237,409.977312)" fill="none" d="M 0 4 L 162.42 4" stroke="url(#goldTower)" stroke-width="8"/>
    <!-- Dach-Querbalken (horizontal) -->
    <path stroke-linecap="butt" transform="matrix(0.75,0,0,0.75,384.986643,288.169254)" fill="none" d="M 0 4 L 49 4" stroke="#E8B84B" stroke-width="8"/>
    <!-- 5b. Gebäude Antenne/Top -->
    <path stroke-linecap="butt" transform="matrix(0,-0.75,0.75,0,417.232422,336.021186)" fill="none" d="M 0 4 L 63.81 4" stroke="#C9963B" stroke-width="8"/>
    <!-- 6. Gebäude rechts vom höchsten -->
    <path stroke-linecap="butt" transform="matrix(0,-0.75,0.75,0,408.982831,409.976808)" fill="none" d="M 0 4 L 106.21 4" stroke="#E8B84B" stroke-width="8"/>
    <!-- Horizontaler Querbalken 2 -->
    <path stroke-linecap="butt" transform="matrix(0.75,0,0,0.75,411.986743,330.32063)" fill="none" d="M 0 4.5 L 46.61 4.5" stroke="#C9963B" stroke-width="9"/>
    <!-- 7. Gebäude (Antenne oben rechts) -->
    <path stroke-linecap="butt" transform="matrix(0,-0.75,0.75,0,440.939981,356.680198)" fill="none" d="M 0 4 L 33 4" stroke="#C9963B" stroke-width="8"/>
    <!-- Dach-Diagonale rechts -->
    <path stroke-linecap="butt" transform="matrix(0.736191,0.143259,-0.143259,0.736191,432.447342,350.53225)" fill="none" d="M 0 4 L 63.28 4" stroke="#E8B84B" stroke-width="8"/>
    <!-- Arrowhead path 14 -->
    <path fill="#C9963B" transform="translate(430,350)" d="M 21.125 4.285 L 0.73 8.332 L 0.73 0.238 Z"/>
    <!-- 8. Gebäude rechts -->
    <path stroke-linecap="butt" transform="matrix(0,-0.75,0.75,0,430.73403,409.978008)" fill="none" d="M 0 4 L 77.54 4" stroke="#C9963B" stroke-width="8"/>
    <!-- 9. Gebäude ganz rechts -->
    <path stroke-linecap="butt" transform="matrix(0,-0.75,0.75,0,473.189692,409.978536)" fill="none" d="M 0 4 L 67.05 4" stroke="#C9963B" stroke-width="8"/>
  </svg>

  <!-- ── Trennlinie ── -->
  <line x1="142" y1="10" x2="142" y2="86" stroke="#2a2a2e" stroke-width="1"/>

  <!-- ── Wordmark: Skyline (weiß) + Sites (gold) ── -->
  <text y="57" font-family="Plus Jakarta Sans, sans-serif" font-size="42" font-weight="800" letter-spacing="-0.5">
    <tspan x="158" fill="#ffffff">Skyline</tspan><tspan fill="url(#goldText)">Sites</tspan>
  </text>

  <!-- ── Tagline ── -->
  <text x="159" y="77" font-family="Inter, sans-serif" font-size="8.5" fill="#4a4a52" letter-spacing="3.5">WEB DESIGN AGENTUR</text>
</svg>
