    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #09090b; font-family: 'Inter', sans-serif; color: #fff; padding: 56px 24px; }

    .label { font-size: 10px; color: #3f3f46; letter-spacing: 3px; text-transform: uppercase; text-align: center; margin-bottom: 32px; }

    /* Dark preview */
    .preview-dark {
      max-width: 800px;
      margin: 0 auto 3px;
      background: #09090b;
      border: 1px solid #1c1c1f;
      border-radius: 16px 16px 0 0;
      padding: 56px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* Light preview */
    .preview-light {
      max-width: 800px;
      margin: 0 auto 48px;
      background: #f4f4f5;
      border: 1px solid #e4e4e7;
      border-radius: 0 0 16px 16px;
      padding: 56px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    .size-label {
      font-size: 9px;
      color: #3f3f46;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 8px;
      text-align: center;
    }
    .size-label-light { color: #a1a1aa; }

    .logo-block { display: flex; flex-direction: column; align-items: center; }

    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, #27272a, transparent);
    }

    /* SVG inlines */
    .logo-svg text { font-family: 'Plus Jakarta Sans', sans-serif; }
